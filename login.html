<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAP — Accès sécurisé</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 320px;
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 800; color: #1a56db; margin-bottom: 4px; }
    .sub { font-size: 0.85rem; color: #6b7280; margin-bottom: 28px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
    }
    input:focus { border-color: #1a56db; }
    button {
      width: 100%;
      padding: 12px;
      background: #1a56db;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display:none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">KAP</div>
    <div class="sub">Accès réservé au cabinet</div>
    <input type="password" id="pwd" placeholder="Mot de passe" autofocus>
    <button onclick="login()">Entrer</button>
    <div class="error" id="err">Mot de passe incorrect</div>
  </div>
  <script>
    const MOT_DE_PASSE = 'kap2026';
    function login() {
      if (document.getElementById('pwd').value === MOT_DE_PASSE) {
        document.cookie = 'kap-auth=' + MOT_DE_PASSE + '; path=/; max-age=2592000';
        window.location.href = '/';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
